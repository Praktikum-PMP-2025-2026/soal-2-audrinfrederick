name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "5 4 2 7 3 6"
          expected-output: |-
            MIN_DIFF 2
            CUT 2 4
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - N minimum
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - N minimum
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 1 2 3"
          expected-output: |-
            MIN_DIFF 2
            CUT 1 2
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - semua elemen sama
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - semua elemen sama
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "6 5 5 5 5 5 5"
          expected-output: |-
            MIN_DIFF 0
            CUT 2 4
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - tie pilih i terkecil lalu j terkecil
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - tie pilih i terkecil lalu j terkecil
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "4 1 1 1 1"
          expected-output: |-
            MIN_DIFF 1
            CUT 1 2
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - urutan naik
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - urutan naik
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "6 1 2 3 4 5 6"
          expected-output: |-
            MIN_DIFF 3
            CUT 3 5
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - urutan turun
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - urutan turun
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "6 6 5 4 3 2 1"
          expected-output: |-
            MIN_DIFF 3
            CUT 1 3
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - ada elemen nol
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - ada elemen nol
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "5 0 0 10 0 0"
          expected-output: |-
            MIN_DIFF 0
            CUT 2 3
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - banyak tie
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - banyak tie
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "5 2 2 2 2 2"
          expected-output: |-
            MIN_DIFF 2
            CUT 1 2
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - distribusi hampir seimbang
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - distribusi hampir seimbang
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "7 3 1 2 2 3 1 2"
          expected-output: |-
            MIN_DIFF 1
            CUT 2 5
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - dominasi awal array
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - dominasi awal array
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "5 10 1 1 1 1"
          expected-output: |-
            MIN_DIFF 9
            CUT 1 2
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
